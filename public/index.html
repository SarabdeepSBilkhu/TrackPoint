<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTVTS - Real-Time Vehicle Tracking System</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.344.0/icons/map-pin.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Dashboard -->
        <aside class="dashboard glass">
            <header>
                <div class="logo">
                    <span class="pulse"></span>
                    <h1>RTVTS</h1>
                </div>
                <p class="subtitle">Vehicle Tracking System</p>
                <div id="user-info" class="user-badge glass">
                    <span id="username-display">User</span>
                    <button id="logout-btn" class="btn-icon">Logout</button>
                </div>
            </header>

            <section class="status-panel">
                <div class="panel-card glass">
                    <h3>Tracking Status</h3>
                    <div id="tracking-indicator" class="status-indicator">
                        <span class="dot offline"></span>
                        <span class="label">Disconnected</span>
                    </div>
                </div>

                <div class="panel-card glass">
                    <h3>Active Vehicles</h3>
                    <div id="vehicle-count" class="big-number">0</div>
                </div>

                <div class="panel-card glass" id="controls">
                    <h3>Vehicle Control</h3>
                    <div class="btn-group">
                        <button id="start-tracking" class="btn primary">Start My GPS</button>
                        <select id="vehicle-type" class="glass-select">
                            <option value="car">Car</option>
                            <option value="truck">Truck</option>
                            <option value="bike">Bike</option>
                        </select>
                    </div>
                </div>

                <!-- History Player -->
                <div class="panel-card glass" id="history-panel">
                    <h3>Route History</h3>
                    <div class="history-controls">
                        <select id="vehicle-select" class="glass-select">
                            <option value="">Select vehicle...</option>
                        </select>
                        <button id="show-history" class="btn secondary">View Route</button>
                        <button id="clear-history" class="btn danger-outline">Clear</button>
                    </div>
                </div>

            </section>

            <footer>
                <p>&copy; 2026 RTVTS. All rights reserved.</p>
            </footer>
        </aside>

        <!-- Main Map Container -->
        <main id="map-container">
            <div id="map"></div>
            <!-- Overlay for current coords -->
            <div class="map-overlay glass">
                <div class="coord-item">
                    <span class="label">Lat:</span>
                    <span id="curr-lat">--.----</span>
                </div>
                <div class="coord-item">
                    <span class="label">Lng:</span>
                    <span id="curr-lng">--.----</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
